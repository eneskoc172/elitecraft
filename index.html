  {id:15,name:'Hakiki Deri AirPods Kılıfı',price:199,oldPrice:null,emoji:'🎧',cat:'kilif',badge:'İndirim',bg:'bg3',rating:4.7,reviews:98,desc:'AirPods’unuzu çizilmelere karşı korur, şık hakiki deri kaplama.',feats:['Hakiki deri','Darbeye dayanıklı','Magnet kapak','Taşıma kolaylığı'],colors:['#3E2723','#C0C0C0','#FFF']},
];
let cart={};
let currentCat='all';
let currentProduct=null;
let detQty=1;
let favs=new Set();
let selColor=0;

function filterCat(btn,cat){
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  currentCat=cat;
  renderProducts();
}

function renderProducts(){
  const filtered=currentCat==='all'?products:products.filter(p=>p.cat===currentCat);
  document.getElementById('products').innerHTML=filtered.map(p=>{
    const inCart=cart[p.id]&&cart[p.id].qty>0;
    const stars='⭐'.repeat(Math.round(p.rating));
    return`<div class="product-card" onclick="showDetail(${p.id})">
      ${p.badge?`<div class="p-badge">${p.badge}</div>`:''}
      <div class="p-img ${p.bg}">${p.emoji}</div>
      <div class="p-body">
        <div class="p-name">${p.name}</div>
        <div class="p-rating">${stars} ${p.rating} (${p.reviews})</div>
        <div class="p-price">₺${p.price.toLocaleString('tr-TR')}</div>
        <button class="add-btn ${inCart?'added':''}" onclick="event.stopPropagation();quickAdd(${p.id})">
          ${inCart?'✓ Sepette':'+ Sepete Ekle'}
        </button>
      </div>
    </div>`;
  }).join('');
}

function showDetail(id){
  currentProduct=products.find(p=>p.id===id);
  const p=currentProduct;
  detQty=1;
  selColor=0;
  document.getElementById('d-img').className=`detail-img ${p.bg}`;
  document.getElementById('d-img').textContent=p.emoji;
  document.getElementById('d-name').textContent=p.name;
  document.getElementById('d-badge').textContent=p.badge||'';
  document.getElementById('d-badge').style.display=p.badge?'block':'none';
  const starsArr=['★','★','★','★','★'].map((s,i)=>i<Math.floor(p.rating)?'⭐':'☆').join('');
  document.getElementById('d-stars').textContent='⭐'.repeat(Math.round(p.rating));
  document.getElementById('d-rcount').textContent=`${p.rating} · ${p.reviews} değerlendirme`;
  document.getElementById('d-price').textContent='₺'+p.price.toLocaleString('tr-TR');
  const oldEl=document.getElementById('d-old');
  if(p.oldPrice){oldEl.textContent='₺'+p.oldPrice.toLocaleString('tr-TR');oldEl.style.display='inline';}
  else{oldEl.style.display='none';}
  document.getElementById('d-desc').textContent=p.desc;
  document.getElementById('d-feats').innerHTML=p.feats.map(f=>`<div class="feat-item"><div class="feat-dot"></div>${f}</div>`).join('');
  document.getElementById('d-qty').textContent=1;
  const inCart=cart[p.id]&&cart[p.id].qty>0;
  const addBtn=document.getElementById('d-add-btn');
  addBtn.textContent=inCart?'✓ Sepette':'🛒 Sepete Ekle';
  addBtn.className='detail-add-btn'+(inCart?' added':'');
  document.getElementById('d-fav').textContent=favs.has(p.id)?'❤️':'🤍';
  const colorSec=document.getElementById('d-color-sec');
  if(p.colors&&p.colors.length){
    colorSec.style.display='block';
    document.getElementById('d-colors').innerHTML=p.colors.map((c,i)=>`<div class="color-opt${i===0?' sel':''}" style="background:${c};border-color:${i===0?'var(--purple)':'#ddd'}" onclick="selectColor(this,${i})"></div>`).join('');
  } else {colorSec.style.display='none';}
  renderRelated(p);
  document.getElementById('page-home').classList.remove('active');
  document.getElementById('page-detail').classList.add('active');
  document.getElementById('back-btn').style.display='block';
  window.scrollTo(0,0);
}

function renderRelated(p){
  const related=products.filter(x=>x.cat===p.cat&&x.id!==p.id).slice(0,6);
  document.getElementById('related').innerHTML=related.map(r=>`
    <div class="rel-card" onclick="showDetail(${r.id})">
      <div class="rel-img ${r.bg}">${r.emoji}</div>
      <div class="rel-body">
        <div class="rel-name">${r.name}</div>
        <div class="rel-price">₺${r.price.toLocaleString('tr-TR')}</div>
      </div>
    </div>`).join('');
}

function showHome(){
  document.getElementById('page-detail').classList.remove('active');
  document.getElementById('page-home').classList.add('active');
  document.getElementById('back-btn').style.display='none';
  renderProducts();
}

function selectColor(el,idx){
  selColor=idx;
  document.querySelectorAll('.color-opt').forEach((o,i)=>{
    o.classList.toggle('sel',i===idx);
    o.style.borderColor=i===idx?'var(--purple)':'#ddd';
  });
}

function changeDetQty(d){
  detQty=Math.max(1,detQty+d);
  document.getElementById('d-qty').textContent=detQty;
}

function addDetailToCart(){
  const p=currentProduct;
  if(!cart[p.id]) cart[p.id]={...p,qty:0};
  cart[p.id].qty+=detQty;
  updateCartCount();
  const btn=document.getElementById('d-add-btn');
  btn.textContent='✓ Sepette';
  btn.className='detail-add-btn added';
  showToast(`${p.emoji} ${detQty} adet sepete eklendi!`);
}

function quickAdd(id){
  const p=products.find(x=>x.id===id);
  if(!cart[id]) cart[id]={...p,qty:0};
  cart[id].qty++;
  updateCartCount();
  renderProducts();
  showToast(`${p.emoji} ${p.name} sepete eklendi!`);
}

function toggleFav(){
  const id=currentProduct.id;
  if(favs.has(id)){favs.delete(id);document.getElementById('d-fav').textContent='🤍';}
  else{favs.add(id);document.getElementById('d-fav').textContent='❤️';showToast('❤️ Favorilere eklendi!');}
}

function updateCartCount(){
  document.getElementById('cart-count').textContent=Object.values(cart).reduce((s,i)=>s+i.qty,0);
}

function openCart(){
  renderCartItems();
  document.getElementById('cart-panel').classList.add('open');
  document.getElementById('overlay').classList.add('on');
}

function closeCart(){
  document.getElementById('cart-panel').classList.remove('open');
  document.getElementById('overlay').classList.remove('on');
}

function renderCartItems(){
  const items=Object.values(cart);
  const container=document.getElementById('cart-items');
  if(!items.length){container.innerHTML='<div class="empty-cart"><div style="font-size:2.5rem">🛒</div>Sepetiniz boş</div>';document.getElementById('total-price').textContent='₺0';return;}
  container.innerHTML=items.map(i=>`<div class="cart-item">
    <div class="ci-emoji">${i.emoji}</div>
    <div class="ci-info"><div class="ci-name">${i.name}</div><div class="ci-price">₺${(i.price*i.qty).toLocaleString('tr-TR')}</div></div>
    <div class="ci-qty">
      <button class="qty-btn2" onclick="cartQty(${i.id},-1)">−</button>
      <span class="qty-val">${i.qty}</span>
      <button class="qty-btn2" onclick="cartQty(${i.id},1)">+</button>
    </div>
  </div>`).join('');
  document.getElementById('total-price').textContent='₺'+items.reduce((s,i)=>s+i.price*i.qty,0).toLocaleString('tr-TR');
}

function cartQty(id,d){
  if(!cart[id])return;
  cart[id].qty+=d;
  if(cart[id].qty<=0)delete cart[id];
  updateCartCount();
  renderCartItems();
  if(currentProduct&&currentProduct.id===id){
    const inCart=cart[id]&&cart[id].qty>0;
    const btn=document.getElementById('d-add-btn');
    if(btn){btn.textContent=inCart?'✓ Sepette':'🛒 Sepete Ekle';btn.className='detail-add-btn'+(inCart?' added':'');}
  }
}

function confirmOrder(){
  const name=document.getElementById('fname').value.trim();
  const phone=document.getElementById('fphone').value.trim();
  const address=document.getElementById('faddress').value.trim();
  const city=document.getElementById('fcity').value.trim();
  const district=document.getElementById('fdistrict').value.trim();
  const note=document.getElementById('fnote').value.trim();
  if(!name||!phone||!address||!city||!district){showToast('⚠️ Lütfen tüm alanları doldurun!');return;}
  const items=Object.values(cart);
  if(!items.length){showToast('🛒 Sepetiniz boş!');return;}
  const total=items.reduce((s,i)=>s+i.price*i.qty,0);
  let msg='🛍️ *YENİ SİPARİŞ - RenkliShop*\n━━━━━━━━━━━━━━━\n*📦 SİPARİŞ LİSTESİ*\n';
  items.forEach(i=>{msg+=`${i.emoji} ${i.name} x${i.qty} = ₺${(i.price*i.qty).toLocaleString('tr-TR')}\n`;});
  msg+=`━━━━━━━━━━━━━━━\n💰 *TOPLAM: ₺${total.toLocaleString('tr-TR')}*\n━━━━━━━━━━━━━━━\n*📍 TESLİMAT*\n👤 ${name}\n📞 ${phone}\n🏠 ${address}\n📍 ${city} / ${district}`;
  if(note) msg+=`\n📝 ${note}`;
  window.open(`https://wa.me/905xxxxxxxxx?text=${encodeURIComponent(msg)}`,'_blank');
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

renderProducts();
</script>
